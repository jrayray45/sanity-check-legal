<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sanity Check - Legal</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f0e8; color: #2c2c2c; }
    header { background: #4A6B5D; padding: 24px 20px; text-align: center; }
    header h1 { color: #f5f0e8; font-size: 28px; font-weight: 700; letter-spacing: 0.05em; }
    header p { color: #c8d8d0; margin-top: 6px; font-size: 14px; }
    main { max-width: 600px; margin: 48px auto; padding: 0 20px; }
    h2 { color: #4A6B5D; font-size: 20px; margin-bottom: 24px; }
    .links { display: flex; flex-direction: column; gap: 16px; }
    .link-card { background: #fff; border-radius: 12px; padding: 20px 24px; border: 1px solid #d8e4df; text-decoration: none; color: inherit; display: block; }
    .link-card:hover { background: #eef5f1; border-color: #4A6B5D; }
    .link-card h3 { color: #4A6B5D; font-size: 16px; margin-bottom: 6px; }
    .link-card p { font-size: 14px; color: #666; }
    footer { text-align: center; padding: 32px 20px; color: #999; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>SANITY CHECK</h1>
    <p>Legal Documents</p>
  </header>
  <main>
    <h2>Legal Information</h2>
    <div class="links">
      <a href="privacy.html" class="link-card">
        <h3>Privacy Policy</h3>
        <p>How we collect, use, and protect your data</p>
      </a>
      <a href="terms.html" class="link-card">
        <h3>Terms of Service</h3>
        <p>Rules and conditions for using Sanity Check</p>
      </a>
    </div>
  </main>
  <footer>
    <p>&copy; 2026 Joe Raymond. All rights reserved.</p>
  </footer>
</body>
</html>
